<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="description" content="AlzCare AI — Compassionate Alzheimer's Support System" />

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="icons/Icon-192.png" />
  <link rel="apple-touch-icon" href="icons/Icon-192.png" />

  <!-- Progressive Web App manifest -->
  <link rel="manifest" href="manifest.json" />

  <title>AlzCare AI</title>

  <!-- Prevent flash of unstyled content -->
  <style>
    body {
      margin: 0;
      background-color: #F7F3EE;
      font-family: 'Segoe UI', system-ui, sans-serif;
    }
    /* Loading screen shown before Flutter initialises */
    #loading-overlay {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: #1A5276;
      z-index: 9999;
      transition: opacity 0.5s ease;
    }
    #loading-overlay.hidden { opacity: 0; pointer-events: none; }
    .loading-heart {
      font-size: 56px;
      animation: pulse 1.2s ease-in-out infinite;
    }
    .loading-text {
      color: rgba(255,255,255,0.85);
      font-size: 22px;
      font-weight: 600;
      margin-top: 18px;
      letter-spacing: 0.5px;
    }
    .loading-sub {
      color: rgba(255,255,255,0.55);
      font-size: 15px;
      margin-top: 8px;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.15); }
    }
  </style>
</head>
<body>
  <!-- Loading overlay — hidden once Flutter renders -->
  <div id="loading-overlay">
    <div class="loading-heart">❤️</div>
    <div class="loading-text">AlzCare AI</div>
    <div class="loading-sub">Loading your compassionate assistant…</div>
  </div>

  <!-- Flutter renders here -->
  <script>
    // Hide loading overlay once Flutter first frame is drawn
    window.addEventListener('flutter-first-frame', () => {
      const overlay = document.getElementById('loading-overlay');
      if (overlay) {
        overlay.classList.add('hidden');
        setTimeout(() => overlay.remove(), 600);
      }
    });
  </script>

  <!-- Flutter bootstrap -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
